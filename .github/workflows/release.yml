name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset_name: msst-net-client-installer-linux-x86-64
            use_cross: true

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset_name: msst-net-client-installer-linux-arm64
            use_cross: true

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: msst-net-client-installer-windows-x86-64.exe
            use_cross: false

          - target: aarch64-pc-windows-msvc
            os: windows-latest
            asset_name: msst-net-client-installer-windows-arm64.exe
            use_cross: false

          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: msst-net-client-installer-macos-x86-64
            use_cross: false

          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: msst-net-client-installer-macos-arm64
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: cp "target/${{ matrix.target }}/release/msst-net-client-installer" "${{ matrix.asset_name }}"

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "target/${{ matrix.target }}/release/msst-net-client-installer.exe" "${{ matrix.asset_name }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ matrix.asset_name }}